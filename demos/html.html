<!DOCTYPE html>
<html>
    <head>
        <link href="./css.css" rel="stylesheet" type="text/css" />
        <title>This is a title</title>
        <!-- This is a comment! -->
        <style>
            /* Direct elements */
            h1, h2, h3 {
                background: #ffffff;
            }
            
            /* Classes */
            .foo, .bar {
                --color: hsl(1, 2, 3);
                background: var(--color);
            }
            
            /* IDs */
            #kek, #lel {
                transition: ease 0.12s;
            }
        </style>
    </head>
    <body>
        <h1>Header 1</h1>
        <h2>Header 2</h2>
        <h3>Header 3</h3>
        <h4>Header 4</h4>
        <h5>Header 5</h5>
        <h6>Header 6</h6>
        <i>Italic text</i>
        <em>Bold text</em>
        <a href="#">Link</a>
    </body>
</html>
